<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지식 베이스 관리자 제어창</title>
    <link rel="stylesheet" href="admin_style.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <!-- Password Gate -->
    <div id="passwordGate" class="password-gate">
        <div class="password-card">
            <div class="password-logo"><i class="ri-shield-user-fill"></i></div>
            <h2>BR Team 챗봇</h2>
            <p>관리자 비밀번호를 입력해주세요.</p>
            <input type="password" id="gatePasswordInput" placeholder="비밀번호 입력...">
            <button id="gateSubmitBtn">로그인</button>
            <div id="gateErrorMsg" class="gate-error-msg">비밀번호가 일치하지 않습니다.</div>
        </div>
    </div>

    <!-- Main Admin Container -->
    <div class="admin-container hidden" id="adminContainer">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon"><i class="ri-settings-4-fill"></i></div>
                <div>
                    <h1>BR Team 챗봇</h1>
                    <span>Knowledge Base Admin</span>
                </div>
            </div>
            
            <nav class="sidebar-nav" id="sidebarNav">
                <a href="#" class="nav-item active" data-tab="dashboard">
                    <i class="ri-dashboard-line"></i> 대시보드
                </a>
                <a href="#" class="nav-item" data-tab="config">
                    <i class="ri-settings-3-line"></i> 챗봇 설정 관리
                </a>
                <div style="margin: 10px 0; border-bottom: 1px solid var(--glass-border);"></div>
                <!-- Dynamic nav items will be appended here -->
            </nav>

            <div class="sidebar-footer">
                <div class="connection-status">
                    <div class="status-item">
                        <span class="status-indicator online" id="notionStatusLamp"></span>
                        <span>Notion API 연결됨</span>
                    </div>
                    <div class="status-item">
                        <span class="status-indicator online" id="qdrantStatusLamp"></span>
                        <span>Qdrant 연결됨</span>
                    </div>
                </div>
                <button id="logoutBtn" class="logout-btn"><i class="ri-logout-box-r-line"></i> 로그아웃</button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="admin-main">
            <!-- Header -->
            <header class="admin-header">
                <div class="header-title">
                    <h2 id="currentTabTitle">대시보드</h2>
                    <p id="currentTabDesc">지식 베이스 동기화 및 학습 상태 관리</p>
                </div>
                <div class="header-actions">
                    <button id="refreshAllBtn" class="btn btn-primary">
                        <i class="ri-refresh-line"></i> 전체 상태 새로고침
                    </button>
                </div>
            </header>

            <!-- Dashboard Tab Content -->
            <section class="tab-content active" id="tabContent-dashboard">
                <!-- Status Cards -->
                <div class="stats-grid" id="statsGrid">
                    <!-- Dynamic stat cards will be inserted here -->
                    <div class="stat-card" id="qdrantStatCard">
                        <div class="stat-icon qdrant"><i class="ri-cpu-line"></i></div>
                        <div class="stat-info">
                            <span class="stat-label">Qdrant 총 청크(벡터) 수</span>
                            <h3 class="stat-val" id="count-qdrant-vectors">0 개</h3>
                            <span class="stat-sub">임베딩 차원: 3072</span>
                        </div>
                    </div>
                </div>

                <!-- Database Info Blocks -->
                <div class="info-blocks-grid" id="infoBlocksGrid">
                    <!-- Dynamic info blocks will be appended here -->
                </div>
            </section>

            <!-- Config Tab Content -->
            <section class="tab-content" id="tabContent-config">
                <div class="table-container" style="padding: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3 style="margin: 0;">각 게시판(팀)별 챗봇 접속 및 화면 설정</h3>
                        <button id="saveConfigBtn" style="padding: 10px 20px; background: var(--primary-color); border: none; color: white; border-radius: 8px; font-weight: 600; cursor: pointer;">
                            <i class="ri-save-line"></i> 전체 설정 저장
                        </button>
                    </div>
                    <div id="configFormsContainer" style="display: flex; flex-direction: column; gap: 20px;">
                        <!-- Dynamic Config Forms -->
                    </div>
                </div>
            </section>

            <!-- Dynamic Tab Contents Container -->
            <div id="dynamicTabContentsContainer"></div>

            <!-- Action Bar (Floating at the bottom) -->
            <div class="action-bar hidden" id="actionBar">
                <div class="action-bar-info">
                    <span id="selectedCountText">0개 항목이 선택됨</span>
                </div>
                <div class="action-bar-btns">
                    <button class="btn btn-secondary" id="btnDeleteSelected">
                        <i class="ri-delete-bin-line"></i> Qdrant에서 완전히 삭제
                    </button>
                    <button class="btn btn-success" id="btnSyncSelected">
                        <i class="ri-play-line"></i> 선택한 매뉴얼 동기화 시작
                    </button>
                </div>
            </div>

            <!-- Console Log Panel -->
            <div class="console-panel">
                <div class="console-header">
                    <div class="console-title"><i class="ri-terminal-box-line"></i> 동기화 로그 콘솔</div>
                    <button id="clearConsoleBtn" class="clear-console-btn"><i class="ri-delete-bin-7-line"></i></button>
                </div>
                <div class="console-body" id="consoleLogs">
                    <div class="log-line info">관리자 로그인 성공. 대기 중...</div>
                </div>
            </div>
        </main>
    </div>

    <script src="admin.js"></script>
</body>
</html>
