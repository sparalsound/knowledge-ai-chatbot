<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BR Team 챗봇</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar / Header -->
        <header class="header">
            <div class="header-left">
                <button id="sidebarToggle" class="action-icon-btn sidebar-toggle-btn" title="매뉴얼 목록">
                    <i class="ri-book-3-line"></i>
                </button>
                <div class="logo">
                    <div class="logo-icon"><i class="ri-robot-2-fill"></i></div>
                    <h1 id="chatbotTitle">BR Team 챗봇</h1>
                </div>
            </div>
            <div class="header-right" style="display: flex; align-items: center; gap: 12px;">
                <div class="theme-toggle" id="themeToggle" style="margin: 0;">
                    <i class="ri-moon-fill dark-icon"></i>
                    <i class="ri-sun-fill light-icon"></i>
                </div>
                <button class="action-icon-btn" id="settingsToggle" title="설정" style="border-radius: 50%;">
                    <i class="ri-settings-3-line"></i>
                </button>
            </div>
        </header>

        <div class="app-body">
            <!-- Left Sidebar for Reference Manuals -->
            <aside class="sidebar-left" id="sidebarLeft">
                <div class="sidebar-header">
                    <div class="sidebar-title">
                        <i class="ri-book-3-line"></i>
                        <h2>학습된 매뉴얼</h2>
                        <span class="manual-badge" id="manualCount">0</span>
                    </div>
                    <button id="refreshManualsBtn" class="action-icon-btn" title="매뉴얼 목록 동기화">
                        <i class="ri-refresh-line"></i>
                    </button>
                </div>
                
                <div class="sidebar-search">
                    <div class="search-box">
                        <i class="ri-search-line"></i>
                        <input type="text" id="manualSearch" placeholder="매뉴얼 검색...">
                    </div>
                </div>

                <div class="manual-list-wrapper" id="manualsList">
                    <!-- Dynamic manual items will be rendered here -->
                    <div class="manual-loading">
                        <div class="pulse-loader"></div>
                        <span>학습된 매뉴얼을 불러오는 중...</span>
                    </div>
                </div>
            </aside>

            <!-- Chat Area -->
            <main class="chat-container">
                <div class="chat-messages" id="chatMessages">
                    <!-- Welcome Message -->
                    <div class="message bot" id="welcomeMessageBlock">
                        <div class="avatar"><i class="ri-robot-2-line"></i></div>
                        <div class="message-content">
                            <p id="chatbotWelcomeMsg">안녕하세요! 당신이 업로드한 매뉴얼을 기반으로 답변하는 똑똑한 AI 챗봇입니다.</p>
                            <span class="time">Just now</span>
                        </div>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="input-area">
                    <div class="input-wrapper">
                        <textarea id="userInput" placeholder="무엇이든 물어보세요... 관련 매뉴얼을 찾아 답변해 드립니다." rows="1"></textarea>
                        <button id="sendBtn" class="send-btn" disabled>
                            <i class="ri-send-plane-fill"></i>
                        </button>
                    </div>
                    <div class="footer-text">AI는 실수할 수 있으므로 중요한 정보는 원본 매뉴얼을 확인해주세요.</div>
                </div>
            </main>
        </div>
    </div>

    <!-- Webhook Settings Modal -->
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-content" id="settingsContent">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <h3 style="margin: 0; font-size: 1.15rem; font-weight: 600;">Webhook 설정</h3>
                <button id="closeSettingsBtn" style="background: none; border: none; color: var(--text-primary); cursor: pointer; font-size: 1.3rem; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%;">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <p style="font-size: 0.85rem; color: var(--text-secondary); margin: 0 0 16px 0;">n8n Webhook URL을 입력해주세요.</p>
            <input type="text" id="webhookUrl" placeholder="https://chatbot.brit-team.com/webhook/chat" value="https://chatbot.brit-team.com/webhook/chat" style="width: 100%; padding: 10px 12px; border: 1px solid var(--glass-border); background: var(--bg-color); color: var(--text-primary); border-radius: 8px; margin-bottom: 16px; font-size: 0.9rem; outline: none; box-sizing: border-box;">
            <div style="display: flex; gap: 8px;">
                <button id="saveWebhookBtn" style="flex: 1; padding: 10px; background: var(--primary-color); border: none; color: white; border-radius: 8px; font-weight: 600; cursor: pointer;">저장</button>
                <button id="resetWebhookBtn" style="flex: 1; padding: 10px; background: var(--bg-color); border: 1px solid var(--glass-border); color: var(--text-primary); border-radius: 8px; font-weight: 600; cursor: pointer;">초기화</button>
            </div>
        </div>
    </div>

    <!-- Password Gate (Added for team security) -->
    <div id="teamGate" class="settings-panel" style="display: flex; z-index: 10000; flex-direction: column; opacity: 1; pointer-events: auto;">
        <div class="settings-content" style="text-align: center; max-width: 350px;">
            <div class="logo-icon" style="font-size: 3rem; color: var(--primary-color); margin-bottom: 10px;">
                <i class="ri-lock-password-line"></i>
            </div>
            <h3 style="margin-bottom: 10px; font-weight: 600;" id="teamGateTitle">챗봇 접속</h3>
            <p style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 20px;" id="teamGateDesc">팀챗 고유비밀번호를 입력해주세요</p>
            <input type="password" id="teamGateInput" placeholder="팀 비밀번호를 입력하세요" style="width: 100%; padding: 12px; border: 1px solid var(--glass-border); background: var(--bg-color); color: var(--text-primary); border-radius: 8px; margin-bottom: 15px; text-align: center; letter-spacing: 2px;">
            <p id="teamGateError" style="color: #ff4d4f; font-size: 0.85rem; margin-top: -10px; margin-bottom: 15px; display: none;">비밀번호가 일치하지 않습니다.</p>
            <button id="teamGateSubmitBtn" style="width: 100%; padding: 12px; background: var(--primary-color); border: none; color: white; border-radius: 8px; font-weight: 600; cursor: pointer;">
                입장하기
            </button>
        </div>
    </div>

    <!-- Script loaded at the end -->
    <script src="app.js"></script>
</body>
</html>
